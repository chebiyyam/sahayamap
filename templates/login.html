<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SahayamAP - Login</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0d2238 0%, #1a3a5c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container { width: 100%; max-width: 420px; }
        .logo-section { text-align: center; margin-bottom: 30px; }
        .logo-section h1 { font-size: 32px; color: #F5C842; letter-spacing: 2px; margin-bottom: 6px; }
        .logo-section p { color: rgba(255,255,255,0.7); font-size: 14px; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #e0e0e0; }
        .tab {
            flex: 1; padding: 10px; text-align: center; cursor: pointer;
            font-size: 14px; font-weight: bold; color: #999;
            border-bottom: 3px solid transparent; margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab.active { color: #1a3a5c; border-bottom-color: #1a3a5c; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #333; margin-bottom: 6px; }
        input, select {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 14px; transition: border-color 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: #1a3a5c; }
        .role-selector {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 8px; margin-top: 6px;
        }
        .role-btn {
            padding: 10px 6px; border: 2px solid #e0e0e0;
            border-radius: 8px; background: white; cursor: pointer;
            text-align: center; font-size: 11px; transition: all 0.2s;
        }
        .role-btn .role-icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .role-btn.selected { border-color: #1a3a5c; background: #1a3a5c; color: white; }
        .submit-btn {
            width: 100%; background: #1a3a5c; color: white;
            border: none; padding: 14px; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: background 0.2s; margin-top: 8px;
        }
        .submit-btn:hover { background: #0d2238; }
        .error-msg {
            background: #fde8e8; border: 1px solid #e74c3c;
            color: #c0392b; padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 16px; display: none;
        }
        .success-msg {
            background: #e8f5e9; border: 1px solid #27ae60;
            color: #1e7e34; padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 16px; display: none;
        }
        .divider {
            text-align: center; color: #999; font-size: 12px;
            margin: 16px 0; position: relative;
        }
        .divider::before, .divider::after {
            content: ''; position: absolute; top: 50%;
            width: 40%; height: 1px; background: #e0e0e0;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .citizen-btn {
            width: 100%; background: #f0f4f8; color: #1a3a5c;
            border: 2px solid #1a3a5c; padding: 12px; border-radius: 8px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            transition: all 0.2s;
        }
        .citizen-btn:hover { background: #1a3a5c; color: white; }
        .role-info {
            background: #f0f4f8; border-radius: 8px;
            padding: 12px; margin-bottom: 16px; font-size: 12px; color: #555;
        }
        .role-info strong { color: #1a3a5c; }
        .back-link {
            text-align: center; margin-top: 16px;
            font-size: 13px; color: #999;
        }
        .back-link a { color: #1a3a5c; text-decoration: none; font-weight: bold; }
        .form-section { display: none; }
        .form-section.active { display: block; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-section">
        <h1>🌊 SahayamAP</h1>
        <p>సహాయం - Flood Relief Coordination Platform</p>
    </div>

    <div class="card">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('signin')">Sign In</div>
            <div class="tab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <div id="error-msg" class="error-msg"></div>
        <div id="success-msg" class="success-msg"></div>

        <!-- SIGN IN -->
        <div class="form-section active" id="signin-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signin-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signin-password" placeholder="Your password">
            </div>
            <button class="submit-btn" onclick="signIn()">Sign In →</button>

            <div class="divider">or continue without account</div>
            <button class="citizen-btn" onclick="window.location.href='/report'">
                👥 Continue as Citizen (No Login)
            </button>
        </div>

        <!-- SIGN UP -->
        <div class="form-section" id="signup-form">
            <div class="form-group">
                <label>Select Your Role</label>
                <div class="role-selector">
                    <div class="role-btn" onclick="selectRole(this, 'ngo')">
                        <span class="role-icon">🤝</span>
                        NGO / Volunteer
                    </div>
                    <div class="role-btn" onclick="selectRole(this, 'government')">
                        <span class="role-icon">🏛️</span>
                        Government / SDMA
                    </div>
                    <div class="role-btn" onclick="selectRole(this, 'collector')">
                        <span class="role-icon">⚖️</span>
                        District Collector
                    </div>
                </div>
                <input type="hidden" id="selected-role" value="">
            </div>

            <div class="role-info" id="role-info" style="display:none">
                <span id="role-info-text"></span>
            </div>

            <div class="form-group">
                <label>Organization / Department Name</label>
                <input type="text" id="signup-org" placeholder="e.g. Red Cross AP, SDMA Vijayawada">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="your@organization.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="Create a password">
            </div>
            <button class="submit-btn" onclick="signUp()">Create Account →</button>
        </div>

        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://fkzzcmwujwyufuovbtch.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrenpjbXd1and5dWZ1b3ZidGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTQ0MjksImV4cCI6MjA4OTI3MDQyOX0.ALUvJfjhjT-Ln8BwnomUIflSN7b8OT5LshdNg9eFrfQ';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    let selectedRole = '';

    const roleInfo = {
        'ngo': '🤝 <strong>NGO / Volunteer:</strong> Access relief coordination dashboard. Log supplies, coordinate with other organizations, verify citizen reports.',
        'government': '🏛️ <strong>Government / SDMA:</strong> Full access including War Room command center. View all reports, heatmaps, and exportable situation reports.',
        'collector': '⚖️ <strong>District Collector:</strong> Full War Room access with district-level filtering. Generate official PDF situation reports for the Chief Minister.'
    };

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
        document.getElementById(tab + '-form').classList.add('active');
        event.target.classList.add('active');
        hideMessages();
    }

    function selectRole(btn, role) {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedRole = role;
        document.getElementById('selected-role').value = role;
        const info = document.getElementById('role-info');
        info.style.display = 'block';
        document.getElementById('role-info-text').innerHTML = roleInfo[role];
    }

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('success-msg').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('success-msg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('error-msg').style.display = 'none';
    }

    function hideMessages() {
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('success-msg').style.display = 'none';
    }

    async function signIn() {
        const email = document.getElementById('signin-email').value;
        const password = document.getElementById('signin-password').value;
        if (!email || !password) { showError('Please enter email and password.'); return; }

        try {
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) { showError(error.message); return; }

            const { data: profile } = await sb.from('profiles')
                .select('role')
                .eq('id', data.user.id)
                .single();

            const role = profile ? profile.role : 'citizen';

            localStorage.setItem('sahayam_token', data.session.access_token);
            localStorage.setItem('sahayam_role', role);
            localStorage.setItem('sahayam_email', email);

            if (role === 'government' || role === 'collector') {
                window.location.href = '/warroom';
            } else if (role === 'ngo') {
                window.location.href = '/relief';
            } else {
                window.location.href = '/report';
            }
        } catch (err) {
            showError('Login failed. Please try again.');
        }
    }

    async function signUp() {
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        const org = document.getElementById('signup-org').value;
        const role = selectedRole;

        if (!email || !password) { showError('Please enter email and password.'); return; }
        if (!role) { showError('Please select your role.'); return; }
        if (!org) { showError('Please enter your organization name.'); return; }

        try {
            const { data, error } = await sb.auth.signUp({ email, password });

            // Always show success if no auth error — profile creation is secondary
            if (error) {
                showError(error.message);
                return;
            }

            // Try to create profile but don't block on failure
            if (data.user) {
                try {
                    await sb.from('profiles').upsert({
                        id: data.user.id,
                        email: email,
                        role: role,
                        org_name: org
                    });
                } catch (profileErr) {
                    // Profile creation failed but account exists — ignore silently
                    console.log('Profile creation note:', profileErr);
                }
            }

            showSuccess('Account created! You can now sign in.');
            document.querySelectorAll('.tab')[0].click();
            document.getElementById('signin-email').value = email;

        } catch (err) {
            showError('Sign up failed. Please try again.');
        }
    }

    async function checkSession() {
        const { data } = await sb.auth.getSession();
        if (data.session) {
            const { data: profile } = await sb.from('profiles')
                .select('role')
                .eq('id', data.session.user.id)
                .single();
            const role = profile ? profile.role : 'citizen';
            if (role === 'government' || role === 'collector') {
                window.location.href = '/warroom';
            } else if (role === 'ngo') {
                window.location.href = '/relief';
            }
        }
    }

    checkSession();
</script>
</body>
</html>
